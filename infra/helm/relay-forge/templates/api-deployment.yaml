apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "relay-forge.fullname" . }}-api
  labels:
    {{- include "relay-forge.labels" . | nindent 4 }}
    {{- include "relay-forge.selectorLabels" (dict "component" "api" "root" .) | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "relay-forge.selectorLabels" (dict "component" "api" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "relay-forge.labels" . | nindent 8 }}
        {{- include "relay-forge.selectorLabels" (dict "component" "api" "root" .) | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: {{ include "relay-forge.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "relay-forge.image" (dict "repository" .Values.api.image.repository "tag" .Values.api.image.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.global.metrics.port }}
              protocol: TCP
          envFrom:
            {{- include "relay-forge.envFrom" (dict "root" .) | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          {{- include "relay-forge.httpProbes" (dict "port" "http") | nindent 10 }}
