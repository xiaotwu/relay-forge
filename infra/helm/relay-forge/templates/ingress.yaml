{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "relay-forge.fullname" . }}
  labels:
    {{- include "relay-forge.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "relay-forge.fullname" . }}-realtime
                port:
                  number: {{ .Values.realtime.port }}
          - path: /api/v1/media
            pathType: Prefix
            backend:
              service:
                name: {{ include "relay-forge.fullname" . }}-media
                port:
                  number: {{ .Values.media.port }}
          - path: /api/v1/voice
            pathType: Prefix
            backend:
              service:
                name: {{ include "relay-forge.fullname" . }}-media
                port:
                  number: {{ .Values.media.port }}
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "relay-forge.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "relay-forge.fullname" . }}-web
                port:
                  number: {{ .Values.web.port }}
{{- end }}
