apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: relayforge
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: relayforge
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: relayforge
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: ghcr.io/relayforge/worker:latest
          envFrom:
            - configMapRef:
                name: relayforge-config
            - secretRef:
                name: relayforge-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/worker
                - healthcheck
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
