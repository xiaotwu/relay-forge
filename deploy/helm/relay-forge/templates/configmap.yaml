apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "relay-forge.configmapName" . }}
  labels:
    {{- include "relay-forge.labels" . | nindent 4 }}
data:
  RELAY_ENV: {{ .Values.global.env | quote }}
  RELAY_LOG_LEVEL: {{ .Values.global.logLevel | quote }}
  RELAY_LOG_FORMAT: {{ .Values.global.logFormat | quote }}
  API_HOST: "0.0.0.0"
  API_PORT: {{ .Values.api.port | quote }}
  API_BASE_URL: {{ .Values.api.baseUrl | quote }}
  API_CORS_ORIGINS: {{ .Values.api.corsOrigins | quote }}
  REALTIME_HOST: "0.0.0.0"
  REALTIME_PORT: {{ .Values.realtime.port | quote }}
  MEDIA_HOST: "0.0.0.0"
  MEDIA_PORT: {{ .Values.media.port | quote }}
  DB_HOST: {{ .Values.global.database.host | quote }}
  DB_PORT: {{ .Values.global.database.port | quote }}
  DB_NAME: {{ .Values.global.database.name | quote }}
  DB_SSL_MODE: {{ .Values.global.database.sslMode | quote }}
  VALKEY_HOST: {{ .Values.global.valkey.host | quote }}
  VALKEY_PORT: {{ .Values.global.valkey.port | quote }}
  S3_ENDPOINT: {{ .Values.global.s3.endpoint | quote }}
  S3_REGION: {{ .Values.global.s3.region | quote }}
  S3_BUCKET_UPLOADS: {{ .Values.global.s3.bucketUploads | quote }}
  S3_BUCKET_AVATARS: {{ .Values.global.s3.bucketAvatars | quote }}
  S3_BUCKET_EMOJI: {{ .Values.global.s3.bucketEmoji | quote }}
  S3_USE_PATH_STYLE: {{ .Values.global.s3.usePathStyle | quote }}
  LIVEKIT_URL: {{ .Values.global.livekit.url | quote }}
  OTEL_ENABLED: {{ .Values.global.otel.enabled | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.global.otel.endpoint | quote }}
  METRICS_ENABLED: {{ .Values.global.metrics.enabled | quote }}
  METRICS_PORT: {{ .Values.global.metrics.port | quote }}
