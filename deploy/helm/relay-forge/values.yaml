global:
  imageRegistry: ghcr.io/relayforge
  imagePullPolicy: IfNotPresent
  imageTag: latest

  env: production
  logLevel: info
  logFormat: json

  database:
    host: postgres.relayforge.svc.cluster.local
    port: 5432
    name: relayforge
    sslMode: require
    user: relayforge
    existingSecret: ''
    secretKey: DB_PASSWORD

  valkey:
    host: valkey.relayforge.svc.cluster.local
    port: 6379
    existingSecret: ''
    secretKey: VALKEY_PASSWORD

  s3:
    endpoint: https://s3.amazonaws.com
    region: us-east-1
    bucketUploads: relay-uploads
    bucketAvatars: relay-avatars
    bucketEmoji: relay-emoji
    usePathStyle: false
    existingSecret: ''
    accessKeySecretKey: S3_ACCESS_KEY
    secretKeySecretKey: S3_SECRET_KEY

  livekit:
    url: wss://livekit.example.com
    existingSecret: ''
    apiKeySecretKey: LIVEKIT_API_KEY
    apiSecretSecretKey: LIVEKIT_API_SECRET

  auth:
    existingSecret: ''
    jwtSecretKey: AUTH_JWT_SECRET

  otel:
    enabled: false
    endpoint: http://otel-collector.observability.svc.cluster.local:4317

  metrics:
    enabled: true
    port: 9090

api:
  replicaCount: 2
  image:
    repository: api
    tag: ''
  port: 8080
  baseUrl: https://api.relayforge.example.com
  corsOrigins: https://relayforge.example.com
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

realtime:
  replicaCount: 2
  image:
    repository: realtime
    tag: ''
  port: 8081
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

media:
  replicaCount: 2
  image:
    repository: media
    tag: ''
  port: 8082
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

worker:
  replicaCount: 2
  image:
    repository: worker
    tag: ''
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

web:
  replicaCount: 2
  image:
    repository: web
    tag: ''
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingress:
  enabled: true
  className: nginx
  host: relayforge.example.com
  tls:
    enabled: true
    secretName: relayforge-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: '50m'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '120'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '120'

serviceAccount:
  create: true
  name: ''
  annotations: {}
