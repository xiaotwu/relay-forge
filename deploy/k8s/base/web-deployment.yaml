apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: relayforge
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: relayforge
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: relayforge
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: web
          image: ghcr.io/relayforge/web:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
