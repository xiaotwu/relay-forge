apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime
  namespace: relayforge
  labels:
    app.kubernetes.io/name: realtime
    app.kubernetes.io/part-of: relayforge
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: realtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realtime
        app.kubernetes.io/part-of: relayforge
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: realtime
          image: ghcr.io/relayforge/realtime:latest
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: relayforge-config
            - secretRef:
                name: relayforge-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
