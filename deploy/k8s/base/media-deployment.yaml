apiVersion: apps/v1
kind: Deployment
metadata:
  name: media
  namespace: relayforge
  labels:
    app.kubernetes.io/name: media
    app.kubernetes.io/part-of: relayforge
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: media
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media
        app.kubernetes.io/part-of: relayforge
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: media
          image: ghcr.io/relayforge/media:latest
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: relayforge-config
            - secretRef:
                name: relayforge-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
