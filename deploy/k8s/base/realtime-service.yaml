apiVersion: v1
kind: Service
metadata:
  name: realtime
  namespace: relayforge
  labels:
    app.kubernetes.io/name: realtime
    app.kubernetes.io/part-of: relayforge
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: realtime
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
