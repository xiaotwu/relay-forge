apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: relayforge
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: relayforge
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
